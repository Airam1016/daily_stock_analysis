model_list:
  # deepseek
  - model_name: Deepseek-Reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: "os.environ/DEEPSEEK_API_KEY"
      api_base: "https://api.deepseek.com/v1"
      proxy_url: null
      temperature: 1

  # --- Gemini 3.1 Flash Lite (15 RPM / 250K TPM / 500 RPD) ---
  - model_name: G3.1-Flash-Lite-K1
    litellm_params:
      model: gemini/gemini-3.1-flash-lite-preview
      api_key: "os.environ/GEMINI_API_KEY_1"
      proxy_url: "http://host.docker.internal:7897"
      temperature: 0.7 # 模型温度
      rpm: 15 # 每分钟15个请求
      tpm: 250000 # 每分钟25万个令牌
      rpd: 500 # 每天500个请求

  - model_name: G3.1-Flash-Lite-K2
    litellm_params:
      model: gemini/gemini-3.1-flash-lite-preview
      api_key: "os.environ/GEMINI_API_KEY_2"
      proxy_url: "http://host.docker.internal:7897"
      temperature: 0.7
      rpm: 15
      tpm: 250000
      rpd: 500

  - model_name: G3.1-Flash-Lite-K3
    litellm_params:
      model: gemini/gemini-3.1-flash-lite-preview
      api_key: "os.environ/GEMINI_API_KEY_3"
      proxy_url: "http://host.docker.internal:7897"
      temperature: 0.7
      rpm: 15
      tpm: 250000
      rpd: 500

  # --- Gemini 3 Flash (5 RPM / 250K TPM / 20 RPD) ---
  - model_name: G3-Flash-K1
    litellm_params:
      model: gemini/gemini-3-flash-preview
      api_key: "os.environ/GEMINI_API_KEY_1"
      proxy_url: "http://host.docker.internal:7897"
      temperature: 0.7
      rpm: 5
      tpm: 250000
      rpd: 20

  - model_name: G3-Flash-K2
    litellm_params:
      model: gemini/gemini-3-flash-preview
      api_key: "os.environ/GEMINI_API_KEY_2"
      proxy_url: "http://host.docker.internal:7897"
      temperature: 0.7
      rpm: 5
      tpm: 250000
      rpd: 20

  - model_name: G3-Flash-K3
    litellm_params:
      model: gemini/gemini-3-flash-preview
      api_key: "os.environ/GEMINI_API_KEY_3"
      proxy_url: "http://host.docker.internal:7897"
      temperature: 0.7
      rpm: 5
      tpm: 250000
      rpd: 20

  # --- 联通 GLM-5 ---
  - model_name: GLM-5-Unicom
    litellm_params:
      model: openai/glm-5
      api_key: "os.environ/GLM_API_KEY"
      api_base: "https://maas-api.ai-yuanjing.com/openapi/compatible-mode/v1"
      proxy_url: null

# Router 设置
router_settings:
  routing_strategy: "simple-shuffle"
  num_retries: 2
  enable_fallbacks: true